<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirbnbInvoiceX — Working…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #0C0B09;
            --surface: #141310;
            --border:  rgba(255,255,255,0.07);
            --coral:   #FF5A5F;
            --gold:    #D4956A;
            --text:    #EDE8E0;
            --muted:   rgba(237,232,224,0.45);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            -webkit-font-smoothing: antialiased;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            background-size: 200px 200px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.6;
        }

        .quit-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 100;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            font-family: 'DM Sans', sans-serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 2px;
            cursor: pointer;
            transition: color 0.2s, border-color 0.2s;
        }
        .quit-btn:hover { color: var(--coral); border-color: var(--coral); }

        .page {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
            gap: 32px;
        }

        /* animated ring */
        .ring-wrap {
            position: relative;
            width: 72px;
            height: 72px;
            animation: fadeIn 0.5s ease both;
        }
        .ring-outer {
            position: absolute;
            inset: 0;
            border: 1.5px solid rgba(255,90,95,0.12);
            border-radius: 50%;
        }
        .ring-inner {
            position: absolute;
            inset: 0;
            border: 1.5px solid transparent;
            border-top-color: var(--coral);
            border-right-color: rgba(255,90,95,0.3);
            border-radius: 50%;
            animation: spin 1.1s cubic-bezier(0.4,0,0.2,1) infinite;
        }
        .ring-dot {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 5px;
            height: 5px;
            background: var(--coral);
            border-radius: 50%;
            opacity: 0.6;
        }

        .content {
            animation: fadeIn 0.5s 0.1s ease both;
        }

        .wordmark {
            font-family: 'Cormorant Garamond', serif;
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 16px;
        }

        .headline {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            font-weight: 600;
            line-height: 1.1;
            margin-bottom: 6px;
        }

        .headline em { font-style: italic; color: var(--coral); }

        .subline {
            font-size: 13px;
            color: var(--muted);
        }

        /* progress */
        .progress-wrap {
            width: 100%;
            max-width: 380px;
            animation: fadeIn 0.5s 0.2s ease both;
        }

        .progress-track {
            height: 1px;
            background: var(--border);
            border-radius: 1px;
            overflow: hidden;
            margin-bottom: 12px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--coral-dim, #c94347), var(--coral));
            border-radius: 1px;
            transition: width 0.5s cubic-bezier(0.4,0,0.2,1);
        }

        .progress-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .progress-label {
            font-size: 12px;
            letter-spacing: 0.04em;
            color: var(--muted);
        }

        .progress-pct {
            font-family: 'Cormorant Garamond', serif;
            font-size: 13px;
            color: var(--coral);
        }

        /* mfa */
        .mfa-card {
            display: none;
            background: rgba(212,149,106,0.06);
            border: 1px solid rgba(212,149,106,0.18);
            border-radius: 4px;
            padding: 16px 20px;
            max-width: 380px;
            font-size: 13px;
            color: var(--gold);
            line-height: 1.65;
            text-align: left;
            animation: fadeIn 0.4s ease both;
        }
        .mfa-card strong {
            display: block;
            font-weight: 500;
            margin-bottom: 4px;
            letter-spacing: 0.02em;
        }

        .note {
            font-size: 11px;
            color: rgba(237,232,224,0.2);
            letter-spacing: 0.04em;
        }

        @keyframes spin    { to { transform: rotate(360deg); } }
        @keyframes fadeIn  { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    </style>
</head>
<body>

    <form method="POST" action="/quit" onsubmit="return confirm('Quit AirbnbInvoiceX?');" style="position:fixed;top:20px;right:24px;z-index:100;">
        <button type="submit" class="quit-btn">Quit</button>
    </form>

    <div class="page">
        <div class="ring-wrap">
            <div class="ring-outer"></div>
            <div class="ring-inner"></div>
            <div class="ring-dot"></div>
        </div>

        <div class="content">
            <div class="wordmark">AirbnbInvoiceX</div>
            <h1 class="headline">Fetching your <em>invoices</em></h1>
            <p class="subline">Don't close this tab</p>
        </div>

        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-row">
                <span class="progress-label" id="progress-label">Initializing…</span>
                <span class="progress-pct" id="progress-pct">0%</span>
            </div>
        </div>

        <div class="mfa-card" id="mfa-hint">
            <strong>Action needed</strong>
            A browser window opened for Airbnb login.<br>
            Complete your MFA there — it will close automatically.
        </div>

        <div class="note">Files saved to ~/Documents/AirbnbInvoiceX</div>
    </div>

    <script>
        async function pollProgress() {
            try {
                const res = await fetch('/progress');
                const data = await res.json();
                const bar   = document.getElementById('progress-bar');
                const label = document.getElementById('progress-label');
                const pctEl = document.getElementById('progress-pct');
                if (!data || !bar) return;

                const total         = data.total || 0;
                const current       = data.current || 0;
                const done          = !!data.done;
                const status        = data.status || 'unknown';
                const stageProgress = data.stage_progress || 0;
                const pct           = Math.floor(stageProgress);

                bar.style.width = pct + '%';
                if (pctEl) pctEl.textContent = pct + '%';

                if (status === 'mfa_needed') {
                    label.textContent = 'Waiting for login…';
                    document.getElementById('mfa-hint').style.display = 'block';
                } else if (status === 'downloading') {
                    label.textContent = `Booking ${current} of ${total}`;
                } else if (status === 'started') {
                    label.textContent = 'Checking session…';
                } else if (done) {
                    label.textContent = 'Finalizing…';
                } else {
                    label.textContent = 'Initializing…';
                }

                if (!done) {
                    setTimeout(pollProgress, 750);
                } else {
                    checkComplete();
                }
            } catch (e) {
                setTimeout(pollProgress, 2000);
            }
        }

        async function checkComplete() {
            try {
                const res  = await fetch('/complete_check');
                const data = await res.json();
                if (data.done && data.redirect) {
                    window.location.href = data.redirect;
                } else if (data.done) {
                    setTimeout(checkComplete, 750);
                }
            } catch (e) {
                setTimeout(checkComplete, 2000);
            }
        }

        setTimeout(pollProgress, 1000);
    </script>
</body>
</html>
