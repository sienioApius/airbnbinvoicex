<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirbnbInvoiceX — Working…</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:      #111110;
            --surface: #1A1A18;
            --border:  rgba(255,255,255,0.09);
            --coral:   #FF5A5F;
            --text:    #F0EBE3;
            --muted:   rgba(240,235,227,0.5);
        }

        html, body {
            height: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .quit-btn {
            position: fixed;
            top: 20px;
            right: 24px;
            z-index: 100;
            background: rgba(255,90,95,0.1);
            border: 1px solid rgba(255,90,95,0.35);
            color: #FF5A5F;
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 500;
            padding: 9px 20px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s, border-color 0.2s;
        }
        .quit-btn:hover { background: rgba(255,90,95,0.18); border-color: rgba(255,90,95,0.6); }

        .page {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px 24px;
            text-align: center;
            gap: 28px;
        }

        .ring {
            width: 52px;
            height: 52px;
            border: 2px solid rgba(255,90,95,0.15);
            border-top-color: var(--coral);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        h1 {
            font-size: clamp(1.8rem, 4vw, 2.4rem);
            font-weight: 600;
            line-height: 1.2;
        }

        .sub {
            font-size: 17px;
            color: var(--muted);
            font-weight: 300;
            margin-top: -16px;
        }

        .progress-wrap {
            width: 100%;
            max-width: 400px;
        }
        .progress-track {
            height: 3px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 14px;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: var(--coral);
            border-radius: 2px;
            transition: width 0.5s ease;
        }
        .progress-row {
            display: flex;
            justify-content: space-between;
        }
        .progress-label { font-size: 15px; color: var(--muted); }
        .progress-pct   { font-size: 15px; color: var(--coral); font-weight: 500; }

        .mfa-card {
            display: none;
            background: rgba(212,149,106,0.08);
            border: 1px solid rgba(212,149,106,0.2);
            border-radius: 8px;
            padding: 16px 20px;
            max-width: 400px;
            font-size: 15px;
            color: #D4956A;
            line-height: 1.6;
        }

        .footer {
            font-size: 13px;
            color: rgba(240,235,227,0.25);
        }

        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <form method="POST" action="/quit" onsubmit="return confirm('Quit AirbnbInvoiceX?');" style="position:fixed;top:20px;right:24px;z-index:100;">
        <button type="submit" class="quit-btn">Quit</button>
    </form>

    <div class="page">
        <div class="ring"></div>
        <h1>Fetching your invoices…</h1>
        <p class="sub">Don't close this tab</p>

        <div class="progress-wrap">
            <div class="progress-track">
                <div class="progress-fill" id="progress-bar"></div>
            </div>
            <div class="progress-row">
                <span class="progress-label" id="progress-label">Initializing…</span>
                <span class="progress-pct" id="progress-pct">0%</span>
            </div>
        </div>

        <div class="mfa-card" id="mfa-hint">
            A browser window opened for Airbnb login.<br>
            Complete your MFA there — it will close automatically.
        </div>

        <div class="footer">Files saved to ~/Documents/AirbnbInvoiceX</div>
    </div>

    <script>
        async function pollProgress() {
            try {
                const res  = await fetch('/progress');
                const data = await res.json();
                const bar   = document.getElementById('progress-bar');
                const label = document.getElementById('progress-label');
                const pctEl = document.getElementById('progress-pct');
                if (!data || !bar) return;

                const pct    = Math.floor(data.stage_progress || 0);
                const status = data.status || 'unknown';
                const done   = !!data.done;

                bar.style.width = pct + '%';
                if (pctEl) pctEl.textContent = pct + '%';

                if (status === 'mfa_needed') {
                    label.textContent = 'Waiting for login…';
                    document.getElementById('mfa-hint').style.display = 'block';
                } else if (status === 'downloading') {
                    label.textContent = `Booking ${data.current} of ${data.total}`;
                } else if (status === 'started') {
                    label.textContent = 'Checking session…';
                } else if (done) {
                    label.textContent = 'Finalizing…';
                } else {
                    label.textContent = 'Initializing…';
                }

                if (!done) { setTimeout(pollProgress, 750); }
                else        { checkComplete(); }
            } catch (e) { setTimeout(pollProgress, 2000); }
        }

        async function checkComplete() {
            try {
                const res  = await fetch('/complete_check');
                const data = await res.json();
                if (data.done && data.redirect) { window.location.href = data.redirect; }
                else if (data.done)              { setTimeout(checkComplete, 750); }
            } catch (e) { setTimeout(checkComplete, 2000); }
        }

        setTimeout(pollProgress, 1000);
    </script>
</body>
</html>
